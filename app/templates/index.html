<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Budget Flow</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <header>
      <h1>Budget Flow</h1>
      <p>Log your daily spendings and track them.</p>
    </header>

    <main>
      <section class="card">
        <h2>Add Expense</h2>
        <form id="expense-form">
          <div class="row">
            <label for="date">Date</label>
            <input type="date" id="date" name="date" required />
          </div>
          <div class="row">
            <label for="category">Category</label>
            <input type="text" id="category" name="category" list="category-list" placeholder="Groceries" required />
            <datalist id="category-list"></datalist>
          </div>
          <div class="row">
            <label for="amount">Amount (€)</label>
            <input type="number" id="amount" name="amount" step="0.01" min="0" placeholder="0.00" required />
          </div>
          <div class="row">
            <label for="note">Note</label>
            <input type="text" id="note" name="note" placeholder="Optional" />
          </div>
          <button type="submit" class="btn btn--primary">Save</button>
          <div id="form-error" class="error" hidden></div>
        </form>
      </section>

      <section class="card">
        <h2>Expenses</h2>
        <p id="table-status" class="muted" aria-live="polite"></p>
        <table id="expenses-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th class="num">Amount</th>
              <th>Note</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
        <div id="empty" class="muted" hidden>No expenses yet.</div>
      </section>

      <section class="card">
        <h2>Settings</h2>
        <div class="row">
          <label for="currency-select">Currency</label>
          <select id="currency-select">
            <option value="€">Euro (€)</option>
            <option value="$">US Dollar ($)</option>
            <option value="£">British Pound (£)</option>
            <option value="¥">Japanese Yen (¥)</option>
          </select>
          <button id="save-settings" class="btn btn--primary">Save</button>
        </div>
        <div id="settings-status" class="muted" hidden></div>
      </section>
    </main>

    <script type="module" src="/static/js/main.js"></script>
  </body>
</html>
